<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformation</title>
    <style>
    div{
        width: 150px;
        height: 150px;
        background-color: yellow;
        border: 1px solid black;
        transform: translate(500px,100px);
        transform: rotate(20deg);
    }
    h1{
        width: 150px;
        height: 150px;
        background-color: yellow;
        border: 1px solid black;
        transform:rotate(-90deg ); 
        transform: scaleX(0.5);
        transform: skewX(20deg);
        transform: matrix();

    }
    </style>
</head>
<body>
    <h1>The Translate() Method</h1>
    <p>The translate method moves an element from it's current position</p>
    <div>This div element is moved 50 pixels to the right and 100 pixels down from it's curent position</div>

</body>
</html>
