<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conic Gradient</title>
    <style>
        body{
            margin-left: 50px;
        }
        #conic-1{
            height: 200px;
            width: 300px;
            background-color: cyan;
            background-image: conic-gradient(red,green,yellow);
        }
        #conic-2{
            height: 300px;
            width: 300px;
            background-color: cyan;
            background-image: conic-gradient(purple,beige,gold,cyan,brown,magenta,black,aqua,pink);
            border-radius: 50%;
        }
        #conic-3{
            height: 200px;
            width: 200px;
            background-color: red;
            background-image: repeating-conic-gradient(red 0deg 10deg,yellow 10deg 20deg,blue 20deg 30deg);
            border-radius: 50%;
        }

    </style>
</head>
<body>
    <h1>Conic Gradient- Three colors</h1>
    <div id="conic-1"></div>
    <br><br>
    <div id="conic-2"></div>
    <br><br>
    <div id="conic-3"></div>
</body>
</html>
